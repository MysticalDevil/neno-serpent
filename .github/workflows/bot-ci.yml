name: NenoSerpent Bot CI

on:
  workflow_dispatch:

concurrency:
  group: bot-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  bot-gates:
    runs-on: ubuntu-24.04
    env:
      BOT_ML_MODEL_B64: ${{ secrets.BOT_ML_MODEL_B64 }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake 4.x
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "4.1.0"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            ninja-build \
            libgl1-mesa-dev \
            libvulkan-dev \
            libasound2-dev \
            libpulse-dev \
            libsensors-dev \
            python3-pip \
            xvfb \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxkbcommon-x11-0

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.7.2"
          host: "linux"
          target: "desktop"
          modules: "qtmultimedia qtshadertools qtsensors"

      - name: Configure Debug Clang
        run: cmake --preset debug-clang --fresh

      - name: Build Bot Benchmark
        run: cmake --build --preset debug-clang --target bot-benchmark

      - name: Bot Benchmark Gate (Mode Matrix)
        run: |
          BOT_E2E_PROFILE=debug \
          ./scripts/ci/bot_e2e_regression.sh build/debug-clang

      - name: Bot ML Smoke Gate (Repo Tiny Model)
        run: |
          BOT_ML_SMOKE_PROFILE=debug \
          ./scripts/ci/bot_ml_smoke_gate.sh build/debug-clang

      - name: Bot ML No-Regression Gate (optional)
        if: env.BOT_ML_MODEL_B64 != ''
        run: |
          echo "${BOT_ML_MODEL_B64}" | base64 -d > /tmp/nenoserpent_bot_policy_runtime.json
          BOT_ML_MODEL=/tmp/nenoserpent_bot_policy_runtime.json \
          BOT_LEADERBOARD_PROFILE=debug \
          BOT_LEADERBOARD_REQUIRE_NO_REGRESSION=1 \
          ./scripts/ci/bot_leaderboard_regression.sh build/debug-clang
