name: NenoSerpent CMake CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
    - name: Setup CMake 4.x
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: "4.1.0"

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ninja-build \
          libgl1-mesa-dev \
          libvulkan-dev \
          libasound2-dev \
          libpulse-dev \
          libsensors-dev \
          ripgrep \
          python3-pip \
          xvfb \
          libxcb-cursor0 \
          libxcb-xinerama0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxkbcommon-x11-0

    - name: Install Coverage Tooling
      run: |
        python3 -m pip install --user --break-system-packages gcovr
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install Qt6
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.2' # Upgraded to more stable 6.7 LTS
        host: 'linux'
        target: 'desktop'
        # Added qtsensors to the modules list
        modules: 'qtmultimedia qtshadertools qtsensors'

    - name: Configure CMake
      run: |
        export CC=gcc
        export CXX=g++
        cmake --preset debug --fresh

    - name: Build
      run: cmake --build --preset debug

    - name: Run Tests
      run: |
        export QT_QPA_PLATFORM=offscreen
        xvfb-run -a ctest --preset debug --output-on-failure

    - name: Configure Coverage Build
      run: cmake --preset coverage --fresh

    - name: Build Coverage Targets
      run: cmake --build --preset coverage

    - name: Coverage Gate (Unit)
      run: |
        find build/coverage -name '*.gcda' -delete
        export QT_QPA_PLATFORM=offscreen
        xvfb-run -a ctest --preset coverage -E "EngineAdapterTest|SessionRunnerTest|AdapterUiCommandTest" --output-on-failure
        ./scripts/ci/coverage_collect.sh build/coverage build/coverage/coverage-unit-summary.json
        python3 ./scripts/ci/coverage_gate.py \
          --summary build/coverage/coverage-unit-summary.json \
          --group unit

    - name: Coverage Gate (Integration)
      run: |
        find build/coverage -name '*.gcda' -delete
        export QT_QPA_PLATFORM=offscreen
        xvfb-run -a ctest --preset coverage -R "EngineAdapterTest|SessionRunnerTest|AdapterUiCommandTest" --output-on-failure
        ./scripts/ci/coverage_collect.sh build/coverage build/coverage/coverage-integration-summary.json
        python3 ./scripts/ci/coverage_gate.py \
          --summary build/coverage/coverage-integration-summary.json \
          --group integration

    - name: Build Bot Benchmark
      run: cmake --build --preset debug --target bot-benchmark

    - name: Bot Benchmark Gate (Mode Matrix)
      run: |
        BOT_E2E_PROFILE=debug \
        ./scripts/ci/bot_e2e_regression.sh build/debug

    - name: Bot ML Smoke Gate (Repo Tiny Model)
      run: |
        BOT_ML_SMOKE_PROFILE=debug \
        ./scripts/ci/bot_ml_smoke_gate.sh build/debug

    - name: Bot ML No-Regression Gate (optional)
      if: ${{ secrets.BOT_ML_MODEL_B64 != '' }}
      run: |
        echo "${{ secrets.BOT_ML_MODEL_B64 }}" | base64 -d > /tmp/nenoserpent_bot_policy_runtime.json
        BOT_ML_MODEL=/tmp/nenoserpent_bot_policy_runtime.json \
        BOT_LEADERBOARD_PROFILE=debug \
        BOT_LEADERBOARD_REQUIRE_NO_REGRESSION=1 \
        ./scripts/ci/bot_leaderboard_regression.sh build/debug
