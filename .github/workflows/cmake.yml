name: NenoSerpent CMake CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  debug-clang-gate:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup CMake 4.x
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "4.1.0"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            clang \
            clang-format \
            clang-tidy \
            ninja-build \
            libgl1-mesa-dev \
            libvulkan-dev \
            libasound2-dev \
            libpulse-dev \
            libsensors-dev \
            ripgrep \
            python3-pip \
            xvfb \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxkbcommon-x11-0

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.7.2"
          host: "linux"
          target: "desktop"
          modules: "qtmultimedia qtshadertools qtsensors"

      - name: Restore ccache (debug-clang)
        uses: actions/cache@v4
        with:
          path: build/debug-clang/.ccache
          key: ${{ runner.os }}-ccache-debug-clang-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', '.github/workflows/cmake.yml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-debug-clang-

      - name: Determine Changed C/C++ Files
        id: changed_cpp
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          if [[ -z "${base_sha}" || "${base_sha}" == "0000000000000000000000000000000000000000" ]]; then
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          git diff --name-only "${base_sha}"...HEAD -- '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' \
            > /tmp/changed-cpp-all.txt
          git diff --name-only "${base_sha}"...HEAD -- 'src/*.cpp' 'src/**/*.cpp' 'tests/**/*.cpp' 'tools/**/*.cpp' \
            > /tmp/changed-cpp-sources.txt

          if [[ -s /tmp/changed-cpp-all.txt ]]; then
            echo "has_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_all=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -s /tmp/changed-cpp-sources.txt ]]; then
            echo "has_sources=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sources=false" >> "$GITHUB_OUTPUT"
          fi

      - name: C/C++ Format Gate
        if: steps.changed_cpp.outputs.has_all == 'true'
        shell: bash
        run: |
          mapfile -t changed_cpp < /tmp/changed-cpp-all.txt
          printf 'format-gate files:\n%s\n' "${changed_cpp[@]}"
          clang-format --dry-run --Werror "${changed_cpp[@]}"

      - name: Configure Debug Clang
        run: cmake --preset debug-clang --fresh

      - name: ccache Stats (Before Debug Clang Build)
        run: ccache --show-stats --verbose || true

      - name: Build Debug Clang
        run: cmake --build --preset debug-clang

      - name: ccache Stats (After Debug Clang Build)
        run: ccache --show-stats --verbose || true

      - name: Clang-Tidy Gate (Analyzer)
        if: steps.changed_cpp.outputs.has_sources == 'true'
        shell: bash
        run: |
          mapfile -t changed_cpp_sources < /tmp/changed-cpp-sources.txt
          printf 'clang-tidy files:\n%s\n' "${changed_cpp_sources[@]}"
          clang-tidy -p build/debug-clang -quiet -checks='-*,clang-analyzer-*' \
            "${changed_cpp_sources[@]}"

      - name: Run Debug Clang Tests
        run: |
          export QT_QPA_PLATFORM=offscreen
          xvfb-run -a ctest --preset debug-clang --output-on-failure

  coverage:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake 4.x
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "4.1.0"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache \
            clang \
            ninja-build \
            libgl1-mesa-dev \
            libvulkan-dev \
            libasound2-dev \
            libpulse-dev \
            libsensors-dev \
            ripgrep \
            python3-pip \
            xvfb \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxkbcommon-x11-0

      - name: Install Coverage Tooling
        run: |
          python3 -m pip install --user --break-system-packages gcovr
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.7.2"
          host: "linux"
          target: "desktop"
          modules: "qtmultimedia qtshadertools qtsensors"

      - name: Restore ccache (coverage)
        uses: actions/cache@v4
        with:
          path: build/coverage/.ccache
          key: ${{ runner.os }}-ccache-coverage-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', '.github/workflows/cmake.yml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-coverage-

      - name: Configure Coverage Build
        run: cmake --preset coverage --fresh

      - name: ccache Stats (Before Coverage Build)
        run: ccache --show-stats --verbose || true

      - name: Build Coverage Targets
        run: cmake --build --preset coverage

      - name: ccache Stats (After Coverage Build)
        run: ccache --show-stats --verbose || true

      - name: Coverage Gate (Unit)
        run: |
          find build/coverage -name '*.gcda' -delete
          export QT_QPA_PLATFORM=offscreen
          xvfb-run -a ctest --preset coverage -E "EngineAdapterTest|SessionRunnerTest|AdapterUiCommandTest" --output-on-failure
          ./scripts/ci/coverage_collect.sh build/coverage build/coverage/coverage-unit-summary.json
          python3 ./scripts/ci/coverage_gate.py \
            --summary build/coverage/coverage-unit-summary.json \
            --group unit

      - name: Coverage Gate (Integration)
        run: |
          find build/coverage -name '*.gcda' -delete
          export QT_QPA_PLATFORM=offscreen
          xvfb-run -a ctest --preset coverage -R "EngineAdapterTest|SessionRunnerTest|AdapterUiCommandTest" --output-on-failure
          ./scripts/ci/coverage_collect.sh build/coverage build/coverage/coverage-integration-summary.json
          python3 ./scripts/ci/coverage_gate.py \
            --summary build/coverage/coverage-integration-summary.json \
            --group integration
